# @package _global_

n_iterations: 10

exp_config_args:
  _target_: core.types.ExperimentConfig

  max_retries: 3

  task_description_file: description.md

  task_description: >-
    You are a Kaggle grandmaster.

    Your solution to this Kaggle challenge should achieve the highest medal possible,
    where the medal rankings from best to worst are gold, silver, and bronze. 

    Your solution is not good enough if it does not medal.

  code_instructions: >-
    Write a single file called solution.py that does the following:\n
      - Loads any relevant training data described in the task description.
      - Loads any relevant test data described in the task description.
      - Note that train and test data may in general have different features. Pay attention to the format of each.
      - It is important your code references the training and test data paths exactly as above,
        via these environment variables, which will already be set correctly for you.\n
      - Performs any arbitrary training and evaluation logic on this data split.
        For example, you might hold out some subset of this data for the purposes
        of k-fold cross validation for model and hyperparameter selection.\n
      - Your code must print out the best, final validation score to stdout in the format "validation_score: <score>".
      - Finally, evaluates the final model on the test data and writes the results
        to a file in the current directory called submission.csv.\n

    All files and directories described in the task description are located under the PUBLIC_RESOURCE_PATH,
    whose value is always available via os.environ.get('PUBLIC_RESOURCE_PATH').
    
    Besides solution.py, you may not create any extra files or modify any other files
    in the directory.

    Remember to define all necessary functions before the `if __name__ == '__main__'` block.

    Your code will be run on a machine with a single H100 GPU.

  entry_fname: solution.py
  fnames: 
    - 'solution.py'

  eval_fname: grader.py

  metric_types:
    validation_score: float

  selection_metric: validation_score
  lower_is_better: false

  eval_metric_types:
    score: float
    total_medals: int
    total_gold_medals: int
    total_silver_medals: int
    total_bronze_medals: int
    total_above_median: int

  eval_metrics_private:
    - '*'

slurm_config_args:
  _target_: core.types.SlurmConfig

  nodes: 1
  tasks_per_node: 1
  gpus_per_node: 1
  cpus_per_task: 12
  job_ttl: 30
  job_name: mlebench
  account: maui
